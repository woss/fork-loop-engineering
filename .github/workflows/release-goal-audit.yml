name: Release goal-audit

on:
  push:
    tags:
      - 'goal-audit-v*'

permissions:
  contents: read
  id-token: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: tools/goal-audit/package-lock.json

      - name: Ensure npm supports trusted publishing (OIDC)
        run: npm install -g npm@latest

      - name: Install, build, test
        working-directory: tools/goal-audit
        run: |
          # Build monorepo sibling first
          (cd ../readiness-core && npm ci && npm run build)
          npm ci
          npm run build
          npm test

      - name: Publish to npm
        working-directory: tools/goal-audit
        run: |
          # Rewrite to registry version for publish
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.dependencies['@cobusgreyling/readiness-core'] = '^1.0.0';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}